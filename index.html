<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's Split Our Bill</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
</head>
<body>


   <div id="container">
        <h1>Let's Split Our Bill!!</h1>


<form aria-label="Bill splitting form">

        <label for="bill">Bill💵</label>    
            <span>
                <input id="bill" type="number" min="0" step="0.01" placeholder="Bill">$
            </span>
            <label for="people">Number of people 🧑‍🤝‍🧑</label>
            <span>
                <input id="people" type="number" min="1" step="1" placeholder="How many people?">
            </span>
            <p>🤎Did you like our service?🤎</p>
            <button type="button" id="addTip">Add a tip!</button>

        <select id="tip">
            <option value="">Select tip</option>
            <option value="0.30">WOW! 30%💗</option>
            <option value="0.20">Good service! 20%💗</option>
            <option value="0.10" selected>It was OK! 10% 😀</option>
            <option value="0.00">No tip!🥺</option>
        </select>
        
        <button type="button" id="btn">Calculate</button>

</form>

<div id="amountPerPerson" aria-label="Amount per person" aria-live="polite">

    <div id="billSplit">
        <p>Bill</p>
        <span>$</span>
        <span id="perBill"></span>
        <span>per person</span>
    </div>

    <div id="totalTip">
        <p>Tip</p>
        <span>$</span>
        <span id="dividedTip"></span>
        <span>per person</span>
    </div>

    <div id="totalAmount">
        <p>Total</p>
        <span>$</span>
        <span id="billAndTip"></span>
        <span>per person</span>
    </div>
</div>

</div>


<script src="//cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="script.js"></script>
</body>
</html>
